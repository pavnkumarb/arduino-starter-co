<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="yt-dark-half" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A202C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yt-title-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D7ECD;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0D7ECD;stop-opacity:0" />
    </linearGradient>
    <clipPath id="yt-clip">
      <rect width="1280" height="720" />
    </clipPath>
  </defs>

  <!-- Left dark half -->
  <rect x="0" y="0" width="640" height="720" fill="url(#yt-dark-half)" />

  <!-- Right light half (project/product image) -->
  <rect x="640" y="0" width="640" height="720" fill="#E2E8F0" />
  <rect x="660" y="20" width="600" height="680" rx="12" fill="rgba(13,126,205,0.04)" stroke="#CBD5E0" stroke-width="2" stroke-dasharray="18 9" />
  <!-- Camera icon -->
  <g transform="translate(960,340)" fill="none" stroke="#A0AEC0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-80" y="-60" width="160" height="120" rx="14" />
    <circle cx="0" cy="0" r="36" />
    <circle cx="0" cy="0" r="22" />
    <rect x="-64" y="-44" width="24" height="18" rx="5" />
  </g>
  <text x="960" y="440" font-family="'Space Grotesk', sans-serif" font-size="24" font-weight="600" fill="#A0AEC0" text-anchor="middle">PROJECT / PRODUCT IMAGE</text>
  <text x="960" y="472" font-family="'Inter', sans-serif" font-size="16" fill="#CBD5E0" text-anchor="middle">Final project photo, hero product shot</text>
  <text x="960" y="500" font-family="'Inter', sans-serif" font-size="16" fill="#CBD5E0" text-anchor="middle">600×680px recommended</text>

  <!-- Left half content -->

  <!-- Episode/Series badge top-left -->
  <rect x="32" y="32" width="180" height="52" rx="8" fill="#FF6B2B" />
  <text x="122" y="64" font-family="'Inter', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">EP. 01</text>
  <rect x="32" y="32" width="180" height="52" rx="8" fill="none" stroke="rgba(255,107,43,0.5)" stroke-width="1.5" stroke-dasharray="10 5" />
  <text x="122" y="100" font-family="'Inter', sans-serif" font-size="14" fill="#4A5568" text-anchor="middle">Episode/series badge</text>

  <!-- Presenter face placeholder (circle) -->
  <circle cx="120" cy="280" r="88" fill="rgba(45,55,72,0.6)" />
  <circle cx="120" cy="280" r="88" fill="none" stroke="#0D7ECD" stroke-width="2" stroke-dasharray="12 6" />
  <!-- Person silhouette -->
  <circle cx="120" cy="252" r="28" fill="#4A5568" />
  <path d="M40,340 Q40,320 60,310 Q80,300 120,300 Q160,300 180,310 Q200,320 200,340" fill="#4A5568" />
  <text x="120" y="400" font-family="'Inter', sans-serif" font-size="14" fill="#718096" text-anchor="middle">PRESENTER FACE</text>
  <text x="120" y="420" font-family="'Inter', sans-serif" font-size="12" fill="#4A5568" text-anchor="middle">Optional, circle crop</text>

  <!-- Tutorial title placeholder (large, left-justified) -->
  <rect x="32" y="140" width="570" height="120" rx="10" fill="url(#yt-title-glow)" stroke="rgba(13,126,205,0.25)" stroke-width="1.5" stroke-dasharray="14 7" />
  <text x="322" y="182" font-family="'Space Grotesk', sans-serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">TUTORIAL TITLE</text>
  <text x="322" y="218" font-family="'Space Grotesk', sans-serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">GOES HERE</text>
  <text x="322" y="248" font-family="'Inter', sans-serif" font-size="14" fill="rgba(255,255,255,0.2)" text-anchor="middle">Space Grotesk 700, 60–80px, white</text>

  <!-- Channel name (Spark Green) -->
  <text x="32" y="480" font-family="'Inter', sans-serif" font-size="24" font-weight="400" fill="#00C896" opacity="0.9">arduino starter co</text>
  <rect x="32" y="456" width="360" height="36" rx="4" fill="none" stroke="rgba(0,200,150,0.3)" stroke-width="1.5" stroke-dasharray="8 4" />

  <!-- Tutorial subtitle/topic line -->
  <rect x="32" y="520" width="540" height="52" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="10 5" />
  <text x="302" y="552" font-family="'Inter', sans-serif" font-size="18" fill="rgba(255,255,255,0.35)" text-anchor="middle">Topic tag or short description</text>

  <!-- Logo bottom-right of dark half -->
  <rect x="400" y="644" width="220" height="44" rx="6" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="8 4" />
  <text x="510" y="672" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.3)" text-anchor="middle">LOGO (reversed)</text>

  <!-- Center overlap: Builder Orange badge straddling the divide -->
  <rect x="548" y="316" width="184" height="88" rx="12" fill="#FF6B2B" />
  <text x="640" y="350" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">BUILD</text>
  <text x="640" y="376" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">ALONG</text>
  <rect x="548" y="316" width="184" height="88" rx="12" fill="none" stroke="rgba(255,107,43,0.5)" stroke-width="1.5" stroke-dasharray="10 5" />
  <text x="640" y="424" font-family="'Inter', sans-serif" font-size="12" fill="#A0AEC0" text-anchor="middle">Center overlap badge</text>

  <!-- Template label -->
  <rect x="0" y="688" width="1280" height="32" fill="rgba(26,32,44,0.7)" />
  <text x="640" y="708" font-family="'Inter', sans-serif" font-size="14" fill="#A0AEC0" text-anchor="middle">TEMPLATE: youtube-thumbnail | 1280×720 | YouTube Tutorial Cover — Remove this bar before export</text>
</svg>
