<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <linearGradient id="twitter-launch-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D7ECD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C896;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="image-overlay" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D7ECD;stop-opacity:0.6" />
      <stop offset="60%" style="stop-color:#0D7ECD;stop-opacity:0" />
    </linearGradient>
    <clipPath id="twitter-clip">
      <rect width="1200" height="628" />
    </clipPath>
  </defs>

  <!-- Full gradient background -->
  <rect width="1200" height="628" fill="url(#twitter-launch-bg)" />

  <!-- Circuit trace decoration left side -->
  <g opacity="0.1" stroke="#FFFFFF" stroke-width="1.5" fill="none">
    <line x1="0" y1="150" x2="80" y2="150" />
    <line x1="80" y1="150" x2="80" y2="100" />
    <circle cx="80" cy="100" r="4" fill="#FFFFFF" />
    <line x1="0" y1="450" x2="120" y2="450" />
    <line x1="120" y1="450" x2="120" y2="500" />
    <circle cx="120" cy="500" r="4" fill="#FFFFFF" />
  </g>

  <!-- Right side: Product image placeholder (55% of width) -->
  <rect x="540" y="0" width="660" height="628" fill="rgba(255,255,255,0.08)" />
  <!-- Image overlay for blend -->
  <rect x="540" y="0" width="660" height="628" fill="url(#image-overlay)" />
  <!-- Dashed placeholder -->
  <rect x="560" y="40" width="620" height="548" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="18 9" />
  <!-- Camera icon placeholder -->
  <g transform="translate(870,280)" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-72" y="-52" width="144" height="104" rx="12" />
    <circle cx="0" cy="0" r="32" />
    <circle cx="0" cy="0" r="20" />
    <rect x="-60" y="-40" width="20" height="16" rx="4" />
  </g>
  <text x="870" y="366" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.4)" text-anchor="middle">PRODUCT IMAGE</text>
  <text x="870" y="396" font-family="'Inter', sans-serif" font-size="16" fill="rgba(255,255,255,0.25)" text-anchor="middle">620×548px recommended</text>

  <!-- Left side: Text content area (45% of width) -->
  <!-- Logo top-left -->
  <rect x="40" y="36" width="220" height="48" rx="6" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="8 4" />
  <text x="150" y="66" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">LOGO (reversed)</text>

  <!-- Launch badge -->
  <rect x="40" y="108" width="160" height="40" rx="20" fill="#FF6B2B" />
  <text x="120" y="134" font-family="'Inter', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">🚀 WE'RE LIVE</text>
  <rect x="40" y="108" width="160" height="40" rx="20" fill="none" stroke="rgba(255,107,43,0.6)" stroke-width="1.5" stroke-dasharray="8 4" />

  <!-- Headline placeholder -->
  <rect x="40" y="172" width="460" height="100" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-dasharray="14 7" />
  <text x="270" y="222" font-family="'Space Grotesk', sans-serif" font-size="24" font-weight="700" fill="rgba(255,255,255,0.6)" text-anchor="middle">HEADLINE TEXT</text>
  <text x="270" y="252" font-family="'Inter', sans-serif" font-size="16" fill="rgba(255,255,255,0.35)" text-anchor="middle">Space Grotesk 700, ~56–64px, white</text>

  <!-- Sub-copy placeholder -->
  <rect x="40" y="288" width="440" height="60" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="12 6" />
  <text x="260" y="316" font-family="'Inter', sans-serif" font-size="18" fill="rgba(255,255,255,0.45)" text-anchor="middle">Supporting sub-copy goes here</text>
  <text x="260" y="340" font-family="'Inter', sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" text-anchor="middle">Inter 400, 22–24px, white @ 90% opacity</text>

  <!-- Second copy line -->
  <rect x="40" y="364" width="360" height="48" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="12 6" />
  <text x="220" y="394" font-family="'Inter', sans-serif" font-size="16" fill="rgba(255,255,255,0.35)" text-anchor="middle">Second copy line (optional)</text>

  <!-- CTA Button (Builder Orange) -->
  <rect x="40" y="436" width="240" height="60" rx="8" fill="#FF6B2B" />
  <text x="160" y="474" font-family="'Inter', sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">SHOP NOW →</text>
  <rect x="40" y="436" width="240" height="60" rx="8" fill="none" stroke="rgba(255,107,43,0.6)" stroke-width="1.5" stroke-dasharray="12 6" />

  <!-- URL / tagline -->
  <text x="40" y="546" font-family="'Inter', sans-serif" font-size="18" fill="rgba(255,255,255,0.5)">yourdomain.com  ←  URL placeholder</text>

  <!-- Vertical divider between left and right -->
  <line x1="540" y1="0" x2="540" y2="628" stroke="rgba(255,255,255,0.15)" stroke-width="1" />

  <!-- Template label -->
  <rect x="0" y="592" width="1200" height="36" fill="rgba(26,32,44,0.5)" />
  <text x="600" y="616" font-family="'Inter', sans-serif" font-size="14" fill="#A0AEC0" text-anchor="middle">TEMPLATE: twitter-launch-announcement | 1200×628 | Twitter/X Banner — Remove this bar before export</text>
</svg>
