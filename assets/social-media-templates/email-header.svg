<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="email-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D7ECD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C896;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="600" height="200" fill="url(#email-bg)" />

  <!-- Subtle circuit traces -->
  <g opacity="0.1" stroke="#FFFFFF" stroke-width="1.5" fill="none">
    <line x1="0" y1="60" x2="80" y2="60" />
    <line x1="80" y1="60" x2="80" y2="30" />
    <circle cx="80" cy="30" r="4" fill="#FFFFFF" />
    <line x1="520" y1="140" x2="600" y2="140" />
    <line x1="520" y1="140" x2="520" y2="170" />
    <circle cx="520" cy="170" r="4" fill="#FFFFFF" />
  </g>

  <!-- Logo placeholder - centered -->
  <rect x="175" y="28" width="250" height="60" rx="8" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-dasharray="10 5" />
  <text x="300" y="64" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">LOGO (reversed, white)</text>

  <!-- Divider line under logo -->
  <line x1="200" y1="104" x2="400" y2="104" stroke="rgba(255,255,255,0.3)" stroke-width="1" />

  <!-- Tagline / campaign name placeholder -->
  <rect x="120" y="116" width="360" height="44" rx="6" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="10 5" />
  <text x="300" y="143" font-family="'Inter', sans-serif" font-size="16" fill="rgba(255,255,255,0.65)" text-anchor="middle">CAMPAIGN TAGLINE / EMAIL SERIES NAME</text>

  <!-- Template label at very bottom -->
  <rect x="0" y="172" width="600" height="28" fill="rgba(26,32,44,0.35)" />
  <text x="300" y="191" font-family="'Inter', sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">TEMPLATE: email-header | 600×200 | Klaviyo Email Header — Remove this bar before export</text>
</svg>
