<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="hero-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D7ECD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C896;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bottom-overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A202C;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#1A202C;stop-opacity:0.92" />
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1080" height="1080" fill="url(#hero-gradient)" />

  <!-- Subtle circuit trace decoration -->
  <g opacity="0.12" stroke="#FFFFFF" stroke-width="2" fill="none">
    <line x1="0" y1="200" x2="120" y2="200" />
    <line x1="120" y1="200" x2="120" y2="140" />
    <circle cx="120" cy="140" r="6" fill="#FFFFFF" />
    <line x1="120" y1="140" x2="260" y2="140" />
    <circle cx="260" cy="140" r="6" fill="#FFFFFF" />

    <line x1="1080" y1="800" x2="940" y2="800" />
    <line x1="940" y1="800" x2="940" y2="860" />
    <circle cx="940" cy="860" r="6" fill="#FFFFFF" />
    <line x1="940" y1="860" x2="820" y2="860" />
    <circle cx="820" cy="860" r="6" fill="#FFFFFF" />
  </g>

  <!-- Top bar -->
  <rect x="0" y="0" width="1080" height="72" fill="rgba(26,32,44,0.3)" />

  <!-- [LOGO PLACEHOLDER] top-left -->
  <rect x="32" y="16" width="200" height="40" rx="4" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-dasharray="8 4" />
  <text x="132" y="42" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">LOGO</text>

  <!-- [HANDLE PLACEHOLDER] top-right -->
  <text x="1048" y="44" font-family="'Inter', sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="end">@HANDLE_PLACEHOLDER</text>

  <!-- Center: Product Image Placeholder -->
  <rect x="90" y="120" width="900" height="700" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-dasharray="20 10" />
  <!-- Placeholder icon - camera -->
  <g transform="translate(540,420)" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-60" y="-44" width="120" height="88" rx="10" />
    <circle cx="0" cy="0" r="28" />
    <circle cx="0" cy="0" r="18" />
    <rect x="-52" y="-36" width="16" height="12" rx="3" />
  </g>
  <text x="540" y="540" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">PRODUCT IMAGE PLACEHOLDER</text>
  <text x="540" y="578" font-family="'Inter', sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.35)" text-anchor="middle">Replace with high-res product photo (min. 900×700px)</text>

  <!-- Bottom overlay -->
  <rect x="0" y="760" width="1080" height="320" fill="url(#bottom-overlay)" />

  <!-- Headline placeholder -->
  <rect x="40" y="790" width="700" height="60" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="12 6" />
  <text x="390" y="829" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.55)" text-anchor="middle">HEADLINE TEXT PLACEHOLDER (Space Grotesk 700, 60–72px)</text>

  <!-- Sub-copy placeholder -->
  <rect x="40" y="868" width="580" height="44" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="12 6" />
  <text x="330" y="896" font-family="'Inter', sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.45)" text-anchor="middle">Supporting copy goes here (Inter 400, 28px)</text>

  <!-- CTA Button placeholder -->
  <rect x="40" y="932" width="260" height="64" rx="8" fill="#FF6B2B" opacity="0.85" />
  <text x="170" y="972" font-family="'Inter', sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">CTA TEXT →</text>
  <rect x="40" y="932" width="260" height="64" rx="8" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="12 6" />

  <!-- Logo bottom-right -->
  <rect x="800" y="940" width="240" height="48" rx="4" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="8 4" />
  <text x="920" y="970" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">LOGO (reversed)</text>

  <!-- Template label (remove before export) -->
  <rect x="0" y="1040" width="1080" height="40" fill="rgba(26,32,44,0.8)" />
  <text x="540" y="1066" font-family="'Inter', sans-serif" font-size="16" fill="#A0AEC0" text-anchor="middle">TEMPLATE: ig-square-product-hero | 1080×1080 | Instagram/TikTok — Remove this bar before export</text>
</svg>
